<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Rehabverve</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="icon" href="assets/img/logo.png">
    <style>
        .forgot-password-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .forgot-password-container h2 {
            color: #00BCD4;
            margin-bottom: 1rem;
        }
        
        .forgot-password-container p {
            margin-bottom: 1.5rem;
            color: #666;
        }
        
        .back-to-login {
            margin-top: 1rem;
        }
        
        .back-to-login a {
            color: #00BCD4;
            text-decoration: none;
        }
        
        .back-to-login a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header class="l-header">
        <nav class="nav bd-grid">
            <div>
                <h2><span class="home__title-color">REHAB</span>VERVE</h2>
            </div>
        </nav>
    </header>

    <div class="forgot-password-container">
        <h2>Reset Your Password</h2>
        <p>Enter your email address and we'll send you a link to reset your password.</p>
        
        <form id="forgot-password-form">
            <div class="form-group">
                <input type="email" id="reset-email" placeholder="Enter your email" required>
            </div>
            <button type="submit" style="width: 100%;">Send Reset Link</button>
        </form>
        
        <div class="back-to-login">
            <a href="index.html">← Back to Login</a>
        </div>
        
        <div id="message" style="margin-top: 1rem;"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/5.5.0/firebase.js"></script>
    <script src="assets/js/configuration.js"></script>
    <script>
        document.getElementById('forgot-password-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('reset-email').value;
            const messageDiv = document.getElementById('message');
            
            firebase.auth().sendPasswordResetEmail(email)
                .then(() => {
                    messageDiv.innerHTML = '<p style="color: green;">Password reset email sent! Check your inbox.</p>';
                    document.getElementById('forgot-password-form').reset();
                })
                .catch((error) => {
                    let errorMessage = 'Error sending reset email. Please try again.';
                    
                    switch (error.code) {
                        case 'auth/invalid-email':
                            errorMessage = 'Invalid email address.';
                            break;
                        case 'auth/user-not-found':
                            errorMessage = 'No account found with this email.';
                            break;
                        case 'auth/too-many-requests':
                            errorMessage = 'Too many attempts. Please try again later.';
                            break;
                    }
                    
                    messageDiv.innerHTML = '<p style="color: red;">' + errorMessage + '</p>';
                });
        });
    </script>
</body>
</html>
